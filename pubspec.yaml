name: simple_bible_app
description: Simple Bible app (KJV/WEB) with offline commentary, favorites, and audio hooks.
publish_to: "none"

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Smart offline search (Android/iOS/desktop)
  sqlite3: ^2.4.7
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5

  # Offline storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Optional API calls (AI commentary / audio)
  http: ^1.2.2

  # Audio playback (for remote generated audio URLs)
  just_audio: ^0.10.5
  record: 6.1.0
  scrollable_positioned_list: ^0.3.5
  share_plus: ^10.0.0
  screenshot: ^3.0.0
  uuid: ^4.5.3
  intl: ^0.20.2
  video_player: ^2.6.1
  flutter_tts: ^4.2.5
  web: ^1.1.1
  pdf: ^3.8.4
  archive: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.11.0

