services:
  - type: web
    name: the-word-app-api
    runtime: python
    plan: free
    rootDir: server

    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: alembic -c alembic.ini upgrade head && python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: SERMON_TRANSCRIPTION_ENABLED
        value: "false"
      - key: SERMON_WHISPER_MODEL
        value: tiny
      - key: SERMON_WHISPER_DEVICE
        value: cpu
      - key: SERMON_WHISPER_COMPUTE_TYPE
        value: int8
      - key: DATABASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
